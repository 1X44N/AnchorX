<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnchorX Humanizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── LIGHT ── */
    :root, [data-theme="light"] {
      --bg:          #eaf7fb;
      --bg2:         #f4fbfd;
      --card:        #ffffff;
      --header:      #ffffff;
      --input-bg:    #ffffff;
      --textarea-bg: #ffffff;
      --border:      #c0e8f5;
      --border-med:  #9dd8ed;
      --text:        #1a2b3c;
      --text-med:    #4a6070;
      --text-dim:    #8aa0b0;
      --aqua:        #00b4d8;
      --aqua-dark:   #0096c7;
      --aqua-deep:   #0077b6;
      --aqua-pale:   #caf0f8;
      --red:         #e05252;
      --red-bg:      #fff0f0;
      --red-border:  #fccaca;
      --green:       #22c55e;
      --yellow:      #f59e0b;
      --shadow:      0 2px 8px rgba(0,120,180,0.06);
      --shadow-btn:  0 4px 16px rgba(0,150,199,0.28);
      --shadow-btn2: 0 6px 22px rgba(0,150,199,0.38);
    }

    /* ── DARK ── */
    [data-theme="dark"] {
      --bg:          #0d1117;
      --bg2:         #0d1117;
      --card:        #161d2b;
      --header:      #111827;
      --input-bg:    #0d1117;
      --textarea-bg: #0d1117;
      --border:      #1e3045;
      --border-med:  #2a4060;
      --text:        #cde4f0;
      --text-med:    #7aaabb;
      --text-dim:    #4a6878;
      --aqua:        #00c8ee;
      --aqua-dark:   #00a8cc;
      --aqua-deep:   #48c9e8;
      --aqua-pale:   #0a2535;
      --red:         #f47070;
      --red-bg:      #2a1010;
      --red-border:  #5a2020;
      --green:       #4ade80;
      --yellow:      #fbbf24;
      --shadow:      0 2px 10px rgba(0,0,0,0.3);
      --shadow-btn:  0 4px 16px rgba(0,100,160,0.35);
      --shadow-btn2: 0 6px 22px rgba(0,100,160,0.5);
    }

    html, body { height:100%; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); overflow:hidden; transition:background 0.3s, color 0.3s; }

    #app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

    /* ── HEADER ── */
    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 20px;
      background:var(--header);
      border-bottom:1px solid var(--border);
      flex-shrink:0;
      box-shadow:var(--shadow);
      transition:background 0.3s, border-color 0.3s;
    }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-icon {
      width:36px; height:36px;
      background:linear-gradient(135deg,#0077b6,#00b4d8);
      border-radius:10px;
      display:flex; align-items:center; justify-content:center;
    }
    .logo-icon svg { width:18px; height:18px; fill:none; stroke:white; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
    .logo-text  { font-size:16px; font-weight:700; color:var(--aqua-deep); }
    .logo-badge { font-size:11px; background:var(--aqua-pale); color:var(--aqua-dark); padding:2px 8px; border-radius:99px; font-weight:500; transition:background 0.3s, color 0.3s; }

    .header-right { display:flex; align-items:center; gap:14px; }

    .toggle-row { display:flex; align-items:center; gap:7px; font-size:12px; font-weight:500; color:var(--text-med); }
    .switch { position:relative; width:40px; height:22px; flex-shrink:0; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:var(--border); border-radius:22px; cursor:pointer; transition:background 0.2s; border:1.5px solid var(--border-med); }
    .slider::before { content:''; position:absolute; height:14px; width:14px; left:3px; top:2px; background:var(--text-dim); border-radius:50%; transition:transform 0.2s, background 0.2s; }
    input:checked + .slider { background:var(--aqua-pale); border-color:var(--aqua); }
    input:checked + .slider::before { transform:translateX(17px); background:var(--aqua-dark); }

    .theme-btn {
      width:34px; height:34px; border-radius:50%;
      background:var(--bg); border:1px solid var(--border);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background 0.2s, transform 0.2s;
      flex-shrink:0;
    }
    .theme-btn:hover { transform:scale(1.1); }
    .theme-btn svg { width:16px; height:16px; fill:none; stroke:var(--text-med); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    .logout-link { font-size:12px; font-weight:500; color:var(--text-dim); text-decoration:none; padding:6px 12px; border:1px solid var(--border); border-radius:8px; transition:color 0.2s, border-color 0.2s; }
    .logout-link:hover { color:var(--red); border-color:var(--red-border); }

    /* ── SCORES ── */
    .scores { display:flex; align-items:center; gap:8px; padding:10px 16px; flex-shrink:0; }
    .score-card { flex:1; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 16px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow); transition:background 0.3s, border-color 0.3s; }
    .sc-label { font-size:11px; font-weight:600; color:var(--text-dim); letter-spacing:0.4px; white-space:nowrap; }
    .sc-bar-wrap { flex:1; height:6px; background:var(--bg); border-radius:99px; overflow:hidden; border:1px solid var(--border); }
    .sc-bar-fill { height:100%; border-radius:99px; width:0%; transition:width 0.7s cubic-bezier(.4,0,.2,1), background 0.3s; }
    .sc-value { font-size:22px; font-weight:700; color:var(--text-dim); min-width:48px; text-align:right; transition:color 0.3s; }
    .arrow { font-size:18px; color:var(--aqua); flex-shrink:0; font-weight:700; }

    /* ── ROAST BANNER ── */
    .roast {
      display:none;
      margin:0 16px 0;
      padding:10px 16px;
      border-radius:12px;
      font-size:13px; font-weight:600;
      animation:roastIn 0.4s cubic-bezier(.22,1,.36,1) both;
      flex-shrink:0;
    }
    .roast.visible { display:flex; align-items:center; gap:10px; }
    .roast.roast-bad  { background:#fff0f0; border:1px solid #fccaca; color:#c0392b; }
    .roast.roast-meh  { background:#fffbea; border:1px solid #fde68a; color:#92610a; }
    .roast.roast-good { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; }
    [data-theme="dark"] .roast.roast-bad  { background:#2a1010; border-color:#5a2020; color:#f47070; }
    [data-theme="dark"] .roast.roast-meh  { background:#2a2000; border-color:#5a4a00; color:#fbbf24; }
    [data-theme="dark"] .roast.roast-good { background:#0a2010; border-color:#1a5030; color:#4ade80; }
    .roast-emoji { font-size:18px; flex-shrink:0; }
    @keyframes roastIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }


    /* ── PANELS ── */
    .panels { display:flex; gap:8px; flex:1; padding:0 16px 8px; min-height:0; }
    .panel { flex:1; display:flex; flex-direction:column; background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); transition:background 0.3s, border-color 0.3s; }
    .panel-head { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); background:var(--bg2); flex-shrink:0; transition:background 0.3s; }
    .panel-title { font-size:11px; font-weight:600; color:var(--text-med); letter-spacing:0.4px; }
    .panel-actions { display:flex; gap:6px; }
    .btn-sm { font-family:'Inter',sans-serif; font-size:11px; font-weight:600; padding:5px 10px; border-radius:7px; cursor:pointer; border:1px solid transparent; transition:all 0.15s; }
    .btn-clear { background:var(--red-bg); color:var(--red); border-color:var(--red-border); }
    .btn-clear:hover { filter:brightness(0.95); }
    .btn-copy { background:var(--aqua-pale); color:var(--aqua-deep); border-color:var(--border-med); }
    .btn-copy:hover { filter:brightness(0.95); }

    textarea, .output-area {
      flex:1; width:100%; min-height:0;
      background:var(--textarea-bg);
      border:none; padding:14px 16px;
      font-family:'Inter',sans-serif; font-size:13.5px; line-height:1.75;
      color:var(--text); resize:none; outline:none;
      transition:background 0.3s, color 0.3s;
    }
    .output-area { overflow-y:auto; white-space:pre-wrap; word-break:break-word; }
    .output-area:empty::before { content:'Humanized text will appear here...'; color:var(--text-dim); font-style:italic; }

    .panel-foot { display:flex; align-items:center; justify-content:space-between; padding:6px 14px; border-top:1px solid var(--border); background:var(--bg2); flex-shrink:0; transition:background 0.3s; }
    .word-count { font-size:11px; color:var(--text-dim); }

    /* ── HUMANIZE BTN ── */
    .action-row { padding:0 16px 8px; flex-shrink:0; }
    #humanize-btn {
      width:100%; padding:14px;
      background:linear-gradient(135deg, #0077b6, var(--aqua));
      color:white; border:none; border-radius:12px;
      font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
      cursor:pointer; letter-spacing:0.3px;
      box-shadow:var(--shadow-btn);
      transition:opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    #humanize-btn:hover:not(:disabled) { opacity:0.9; transform:translateY(-1px); box-shadow:var(--shadow-btn2); }
    #humanize-btn:active:not(:disabled) { transform:scale(0.99); }
    #humanize-btn:disabled { background:var(--border); color:var(--text-dim); cursor:not-allowed; box-shadow:none; transform:none; }
    #humanize-btn svg { width:17px; height:17px; fill:none; stroke:white; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

    /* ── STATUS ── */
    .status-bar { padding:4px 16px 8px; font-size:11px; color:var(--text-dim); flex-shrink:0; display:flex; align-items:center; gap:7px; }
    .status-dot { width:6px; height:6px; border-radius:50%; background:var(--text-dim); flex-shrink:0; transition:background 0.3s; }

    /* ── INDICATORS ── */
    .indicators { display:none; margin:0 16px 8px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; gap:16px; flex-shrink:0; transition:background 0.3s; }
    .indicators.visible { display:flex; }
    .ind-col { flex:1; }
    .ind-title { font-size:11px; font-weight:600; margin-bottom:6px; }
    .ind-item { font-size:11px; color:var(--text-med); padding:2px 0; }
    .ind-item::before { content:'· '; color:var(--aqua); font-weight:700; }

    /* ── SPINNER ── */
    .spinner { display:inline-block; width:15px; height:15px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── TOAST ── */
    .toast { position:fixed; bottom:20px; right:20px; background:var(--aqua-deep); color:white; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; padding:10px 18px; border-radius:10px; box-shadow:var(--shadow-btn); opacity:0; transform:translateY(8px); transition:opacity 0.2s, transform 0.2s; pointer-events:none; z-index:999; }
    .toast.show { opacity:1; transform:translateY(0); }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--aqua); }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="logo-text">AnchorX Humanizer</span>
      <span class="logo-badge">AI Humanizer</span>
    </div>
    <div class="header-right">
      <div class="toggle-row">
        Auto-Fix
        <label class="switch"><input type="checkbox" id="auto-fix" checked /><span class="slider"></span></label>
      </div>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">
        <svg id="theme-icon" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a href="/logout" class="logout-link">Logout</a>
    </div>
  </header>

  <div class="scores">
    <div class="score-card">
      <span class="sc-label">Original AI Score</span>
      <div class="sc-bar-wrap"><div class="sc-bar-fill" id="before-bar"></div></div>
      <span class="sc-value" id="before-score">--</span>
    </div>
    <span class="arrow">›</span>
    <div class="score-card">
      <span class="sc-label">Humanized AI Score</span>
      <div class="sc-bar-wrap"><div class="sc-bar-fill" id="after-bar"></div></div>
      <span class="sc-value" id="after-score">--</span>
    </div>
  </div>

  <div class="roast" id="roast"><span class="roast-emoji" id="roast-emoji"></span><span id="roast-text"></span></div>

  <div class="panels">
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Paste AI text here</span>
        <div class="panel-actions"><button class="btn-sm btn-clear" onclick="clearInput()">Clear</button></div>
      </div>
      <textarea id="input-text" placeholder="Paste your AI-generated text here..." spellcheck="false" oninput="updateCount()"></textarea>
      <div class="panel-foot"><span class="word-count" id="input-count">0 words · 0 chars</span></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Humanized output</span>
        <div class="panel-actions"><button class="btn-sm btn-copy" onclick="copyOutput()">Copy</button></div>
      </div>
      <div class="output-area" id="output-text"></div>
      <div class="panel-foot"><span class="word-count" id="output-count">0 words · 0 chars</span></div>
    </div>
  </div>

  <div class="action-row">
    <button id="humanize-btn" onclick="humanize()">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      Humanize Now
    </button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready — Paste text and click Humanize Now · Auto-Fix on</span>
  </div>

  <div class="indicators" id="indicators">
    <div class="ind-col">
      <div class="ind-title" style="color:var(--red)">Original flags</div>
      <div id="before-indicators"></div>
    </div>
    <div class="ind-col">
      <div class="ind-title" style="color:var(--aqua-dark)">Humanized flags</div>
      <div id="after-indicators"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
  // ── DARK MODE ──────────────────────────────────────────────
  const saved = localStorage.getItem('anchorx-theme') || 'light';
  applyTheme(saved);

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const icon = document.getElementById('theme-icon');
    if (t === 'dark') {
      icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    } else {
      icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('anchorx-theme', next);
    applyTheme(next);
  }

  // ── APP LOGIC ──────────────────────────────────────────────
  function setStatus(msg, color) {
    document.getElementById('status-text').textContent = msg;
    document.getElementById('status-dot').style.background = color || 'var(--text-dim)';
  }

  function scoreColor(s) {
    if (s >= 70) return 'var(--red)';
    if (s >= 40) return 'var(--yellow)';
    return 'var(--green)';
  }

  function updateCount() {
    const t = document.getElementById('input-text').value.trim();
    const w = t ? t.split(/\s+/).length : 0;
    document.getElementById('input-count').textContent = w.toLocaleString() + ' words · ' + t.length.toLocaleString() + ' chars';
  }

  function clearInput() {
    document.getElementById('input-text').value = '';
    updateCount();
    document.getElementById('before-score').textContent = '--';
    document.getElementById('before-score').style.color = 'var(--text-dim)';
    document.getElementById('before-bar').style.width = '0%';
    setStatus('Ready — Paste text and click Humanize Now');
  }

  function copyOutput() {
    const text = document.getElementById('output-text').innerText.trim();
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    });
  }

  async function humanize() {
    const text    = document.getElementById('input-text').value.trim();
    const autoFix = document.getElementById('auto-fix').checked;
    if (!text) { setStatus('Please paste some text first.', 'var(--red)'); return; }

    const btn = document.getElementById('humanize-btn');
    btn.disabled = true;

    // ── Funny loading messages ──
    const loadingMsgs = [
      'bribing the robots... 🤖',
      'teaching it to say "gonna" instead of "will"...',
      'removing unnecessary big words...',
      'adding typos then deleting them...',
      'making it sound like a real person wrote this...',
      'consulting with a guy named Dave...',
      'replacing "utilize" with "use"...',
      'sprinkling in some casual vibes...',
      'hiding the ChatGPT fingerprints...',
      'telling the AI to calm down...',
      'converting robot speak to human speak...',
      'adding a touch of "idk" energy...',
    ];
    let msgIdx = 0;
    function cycleMsg() {
      btn.innerHTML = '<span class="spinner"></span> ' + loadingMsgs[msgIdx % loadingMsgs.length];
      msgIdx++;
    }
    cycleMsg();
    const msgTimer = setInterval(cycleMsg, 1800);

    document.getElementById('output-text').textContent = '';
    document.getElementById('output-count').textContent = '0 words · 0 chars';
    document.getElementById('after-score').textContent = '--';
    document.getElementById('after-bar').style.width = '0%';
    document.getElementById('indicators').classList.remove('visible');
    document.getElementById('roast').className = 'roast';
    setStatus('Analysing text...', 'var(--yellow)');

    try {
      const res  = await fetch('/api/humanize', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text, auto_fix:autoFix}),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        clearInterval(msgTimer);
        setStatus('Error: ' + (data.error || 'Something went wrong'), 'var(--red)');
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Humanize Now';
        return;
      }

      const bScore = data.before.score;
      document.getElementById('before-score').textContent = bScore + '%';
      document.getElementById('before-score').style.color = scoreColor(bScore);
      document.getElementById('before-bar').style.width = bScore + '%';
      document.getElementById('before-bar').style.background = scoreColor(bScore);

      // ── Score roast ──
      showRoast(bScore);

      document.getElementById('output-text').textContent = data.result;
      const words = data.result.trim().split(/\s+/).length;
      document.getElementById('output-count').textContent = words.toLocaleString() + ' words · ' + data.result.length.toLocaleString() + ' chars';

      const aScore = data.after.score;
      document.getElementById('after-score').textContent = aScore + '%';
      document.getElementById('after-score').style.color = scoreColor(aScore);
      document.getElementById('after-bar').style.width = aScore + '%';
      document.getElementById('after-bar').style.background = scoreColor(aScore);

      renderIndicators(data.before.indicators, data.after.indicators);

      const diff = bScore - aScore;
      const att  = data.attempts > 0 ? '  ·  Auto-fix ran ' + data.attempts + 'x' : '';
      setStatus('Done!  ' + bScore + '% → ' + aScore + '%  (−' + diff + '%)  ·  Looks human!' + att, 'var(--aqua-dark)');

    } catch (e) {
      clearInterval(msgTimer);
      setStatus('Network error — is the server running?', 'var(--red)');
    }

    clearInterval(msgTimer);
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Humanize Now';
  }

  function showRoast(score) {
    const roasts = {
      bad: [
        { e:'💀', t:"bro ChatGPT wrote this in its sleep" },
        { e:'🤖', t:"this text has more AI than a Tesla factory" },
        { e:'😭', t:"even your teacher's AI detector is laughing rn" },
        { e:'💀', t:"bro just put ChatGPT in the citation" },
        { e:'🚨', t:"AI DETECTED. AI DETECTED. evacuate the document." },
        { e:'🤖', t:"this reads like ChatGPT had a corporate meltdown" },
      ],
      meh: [
        { e:'👀', t:"it's giving... slightly suspicious" },
        { e:'🤔', t:"your teacher might raise an eyebrow at this one" },
        { e:'😬', t:"kinda human, kinda not. we'll fix it" },
        { e:'⚠️',  t:"middle ground achieved. let's push it further" },
      ],
      good: [
        { e:'🔥', t:"lowkey undetectable. nice work" },
        { e:'✅', t:"passes the vibe check. looks human!" },
        { e:'😎', t:"the robots can't catch you now" },
        { e:'🎉', t:"your teacher will never know. you didn't hear that from me" },
      ]
    };
    let bucket, cls;
    if (score >= 90)      { bucket = roasts.bad;  cls = 'roast-bad'; }
    else if (score >= 50) { bucket = roasts.meh;  cls = 'roast-meh'; }
    else                  { bucket = roasts.good; cls = 'roast-good'; }
    const pick = bucket[Math.floor(Math.random() * bucket.length)];
    document.getElementById('roast-emoji').textContent = pick.e;
    document.getElementById('roast-text').textContent  = pick.t;
    document.getElementById('roast').className = 'roast visible ' + cls;
  }

  function renderIndicators(before, after) {
    ['before','after'].forEach((key, i) => {
      const el = document.getElementById(key + '-indicators');
      el.innerHTML = '';
      (i === 0 ? before : after).slice(0,5).forEach(ind => {
        const d = document.createElement('div');
        d.className = 'ind-item';
        d.textContent = ind;
        el.appendChild(d);
      });
    });
    document.getElementById('indicators').classList.add('visible');
  }

  document.getElementById('input-text').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') humanize();
  });
</script>
</body>
</html>
