<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnchorX Humanizer — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --aqua:      #00b4d8;
      --aqua-dark: #0096c7;
      --aqua-deep: #0077b6;
      --aqua-light:#90e0ef;
      --aqua-pale: #caf0f8;
      --aqua-bg:   #eaf7fb;
      --white:     #ffffff;
      --text:      #1a2b3c;
      --text-med:  #4a6070;
      --text-dim:  #8aa0b0;
      --border:    #c0e8f5;
      --red:       #e05252;
      --font:      'Inter', sans-serif;
    }
    html, body {
      height: 100%;
      background: var(--aqua-bg);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
      background: rgba(0,180,216,0.12);
      top: -220px; right: -220px;
      animation: morph 9s ease-in-out infinite;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%;
      background: rgba(144,224,239,0.15);
      bottom: -160px; left: -160px;
      animation: morph 12s ease-in-out infinite reverse;
      pointer-events: none;
    }
    @keyframes morph {
      0%,100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
      50%      { border-radius: 30% 70% 40% 60% / 60% 30% 70% 40%; }
    }
    .card {
      position: relative;
      width: 420px;
      background: var(--white);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,100,160,0.13), 0 4px 16px rgba(0,100,160,0.06);
      animation: up 0.5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes up {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .card-top {
      background: linear-gradient(135deg, var(--aqua-deep) 0%, var(--aqua-dark) 40%, var(--aqua) 100%);
      padding: 36px 36px 30px;
      position: relative;
      overflow: hidden;
    }
    .card-top::before {
      content:'';
      position:absolute;
      width:200px; height:200px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      top:-60px; right:-40px;
    }
    .card-top::after {
      content:'';
      position:absolute;
      width:120px; height:120px;
      border-radius:50%;
      background:rgba(255,255,255,0.05);
      bottom:-30px; left:20px;
    }
    .logo-icon {
      width:52px; height:52px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:14px;
    }
    .logo-icon svg { width:26px; height:26px; fill:none; stroke:white; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .logo-title { font-size:22px; font-weight:700; color:white; letter-spacing:-0.3px; }
    .logo-sub   { font-size:13px; color:rgba(255,255,255,0.72); margin-top:4px; }
    .card-body  { padding:32px 36px 36px; }
    label {
      display:block;
      font-size:11px; font-weight:600;
      color:var(--text-med);
      letter-spacing:0.8px;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .input-wrap { position:relative; }
    .input-wrap .icon {
      position:absolute; left:13px; top:50%; transform:translateY(-50%);
      width:17px; height:17px;
      pointer-events:none;
      transition:stroke 0.2s;
    }
    .input-wrap .icon path, .input-wrap .icon rect, .input-wrap .icon line { stroke:var(--text-dim); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:stroke 0.2s; }
    input[type="password"] {
      width:100%;
      background:var(--aqua-bg);
      border:1.5px solid var(--border);
      border-radius:12px;
      padding:13px 14px 13px 40px;
      font-family:var(--font);
      font-size:15px;
      color:var(--text);
      outline:none;
      letter-spacing:3px;
      transition:border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    input[type="password"]:focus { border-color:var(--aqua); background:white; box-shadow:0 0 0 4px rgba(0,180,216,0.1); }
    input[type="password"]:focus ~ .icon path,
    input[type="password"]:focus ~ .icon rect { stroke:var(--aqua); }
    input[type="password"]::placeholder { letter-spacing:1px; color:var(--text-dim); }
    .error-box {
      margin-top:12px;
      padding:10px 14px;
      background:#fff0f0;
      border:1px solid #fccaca;
      border-radius:10px;
      font-size:13px;
      color:var(--red);
    }
    .btn {
      margin-top:20px;
      width:100%;
      padding:14px;
      background:linear-gradient(135deg, var(--aqua-dark), var(--aqua));
      color:white;
      border:none;
      border-radius:12px;
      font-family:var(--font);
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      box-shadow:0 4px 16px rgba(0,150,199,0.28);
      transition:opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing:0.2px;
    }
    .btn:hover { opacity:0.9; transform:translateY(-1px); box-shadow:0 6px 22px rgba(0,150,199,0.38); }
    .btn:active { transform:scale(0.99); }
    .btn svg { width:16px; height:16px; fill:none; stroke:white; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .divider {
      margin:22px 0 0;
      text-align:center;
      font-size:12px;
      color:var(--text-dim);
      display:flex; align-items:center; gap:10px;
    }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="logo-title">AnchorX Humanizer</div>
      <div class="logo-sub">AI text humanizer &middot; Private access</div>
    </div>
    <div class="card-body">
      <form method="POST" action="/login">
        <label for="pwd">Password</label>
        <div class="input-wrap">
          <input type="password" id="pwd" name="password" placeholder="Enter your password" autocomplete="current-password" autofocus />
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        {% if error %}<div class="error-box">⚠ {{ error }}</div>{% endif %}
        <button class="btn" type="submit">
          Sign in
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>
      <div class="divider">Authorised users only</div>
    </div>
  </div>
</body>
</html>
